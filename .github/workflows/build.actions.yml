name: Build & Test
on:
  push:
  pull_request:
    types: [assigned, opened, synchronize, reopened, ready_for_review, edited]


env:
  # Workaround testsuite locale issue
  LANG: en_US.UTF-8
  QUARKUS_REGISTRIES: registry.quarkus.redhat.com,registry.quarkus.io
  BOOTSTRAP_MAVEN_REPOS: redhat-ga
  BOOTSTRAP_MAVEN_REPO_REDHAT_GA_URL: https://maven.repository.redhat.com/ga

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: "Build & Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        # Uses sha for added security since tags can be updated
        uses: joschi/setup-jdk@1818212fcdf7eea4e09a6eb156c536640bf7b52f
        with:
          java-version: openjdk21
      - name: Cache Maven Repository
        id: cache-maven
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Build
        run: |
          mvn -e -B -DskipTests=true clean package
      - name: Test
        run: |
          mvn -e -B verify 
